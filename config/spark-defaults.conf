# Spark configuration for Hudi/Parquet processing

spark.sql.extensions org.apache.spark.sql.hudi.HoodieSparkSessionExtension
spark.sql.catalog.spark_catalog org.apache.spark.sql.hudi.catalog.HoodieCatalog

# Hudi settings
spark.hudi.datasource.write.format parquet
spark.hudi.datasource.write.hive_style_partitioning true
spark.hudi.datasource.write.precombine.field _hoodie_commit_time
spark.hudi.parquet.small.file.limit 104857600

# Parallelism
spark.default.parallelism 8
spark.sql.shuffle.partitions 8

# Memory
spark.sql.adaptive.enabled true
spark.sql.adaptive.skewJoin.enabled true

# Logging
spark.loglevel INFO
