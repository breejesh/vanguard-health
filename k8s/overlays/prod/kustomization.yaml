apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: vanguard-health

resources:
  - ../../base

commonLabels:
  environment: prod
  tier: cloud

patches:
  - target:
      kind: Deployment
      name: mongodb
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "1Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
  - target:
      kind: Job
      name: pipeline-orchestrator-main
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: "Always"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "2Gi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "4Gi"
