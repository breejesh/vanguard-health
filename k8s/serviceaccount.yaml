---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vanguard-sa
  namespace: vanguard-health
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vanguard-role
  namespace: vanguard-health
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vanguard-rolebinding
  namespace: vanguard-health
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vanguard-role
subjects:
- kind: ServiceAccount
  name: vanguard-sa
  namespace: vanguard-health
