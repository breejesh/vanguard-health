apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: vanguard-health
data:
  SYNTHEA_API_URL: "https://synthea-fhir-server.mitre.org/fhir"
  SYNTHEA_FETCH_INTERVAL_HOURS: "6"
  DATA_PATH: "/mnt/data"
  BRONZE_PATH: "/mnt/data/bronze"
  SILVER_PATH: "/mnt/data/silver"
  SPARK_MASTER: "local[4]"
  SPARK_IMAGE: "vanguard/spark-jobs:v1.0.0"
  SPARK_EXECUTOR_MEMORY: "2g"
  SPARK_DRIVER_MEMORY: "2g"
  MONGODB_DB: "vanguard_metadata"
  MONGODB_URI: "mongodb://root:mongopass@mongodb:27017/vanguard_metadata?authSource=admin"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  FIREBASE_PROJECT_ID: "vanguard-health-dev"
  LOG_LEVEL: "INFO"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_TOPIC_FETCH_TASKS: "fhir-fetch-tasks"
  KAFKA_CONSUMER_GROUP: "fhir-workers"
  KAFKA_MAX_WORKERS: "4"
  ENABLE_REDIS_CACHING: "false"
  ENABLE_FIREBASE_SYNC: "true"
  ENABLE_KAFKA_WORKER: "true"
  TEST_MODE: "false"
