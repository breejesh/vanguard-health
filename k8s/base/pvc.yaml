---
# Base host path on Docker Desktop Kubernetes node:
# /run/desktop/mnt/host/f/My Data/Academic/GaTech/IHI/vanguard-health/data

apiVersion: v1
kind: PersistentVolume
metadata:
  name: dev-data-pv
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: hostpath
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /run/desktop/mnt/host/f/My Data/Academic/GaTech/IHI/vanguard-health/data/pipeline
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dev-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hostpath
  resources:
    requests:
      storage: 50Gi
  volumeName: dev-data-pv
