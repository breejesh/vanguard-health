---
# Persistent Volume Claim for data storage (uses Docker Desktop default hostpath)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: hostpath
  resources:
    requests:
      storage: 50Gi
---
# Persistent Volume Claim for MongoDB
