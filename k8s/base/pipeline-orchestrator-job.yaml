---
apiVersion: batch/v1
kind: Job
metadata:
  name: pipeline-orchestrator-main
  labels:
    app: pipeline-orchestrator
spec:
  ttlSecondsAfterFinished: 86400
  backoffLimit: 1
  activeDeadlineSeconds: 14400
  
  template:
    metadata:
      labels:
        app: pipeline-orchestrator
        tier: orchestration
    
    spec:
      serviceAccountName: vanguard-sa
      restartPolicy: Never
      
      containers:
      - name: orchestrator
        image: vanguard/pipeline-orchestrator:latest
        imagePullPolicy: IfNotPresent
        
        command:
        - python
        - "-m"
        - "src.common.pipeline_orchestrator"
        
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secrets
        
        env:
        - name: ORCHESTRATION_MODE
          value: "true"
        - name: LOG_LEVEL
          value: "INFO"
        - name: PYTHONUNBUFFERED
          value: "1"
        
        volumeMounts:
        - name: data
          mountPath: /mnt/data
        - name: logs
          mountPath: /app/logs
        
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
      
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: dev-data-pvc
      - name: logs
        emptyDir: {}
