---
apiVersion: v1
kind: Service
metadata:
  name: dev-mongodb-nodeport
  namespace: vanguard-health
  labels:
    app: vanguard-health
    component: mongodb
spec:
  type: NodePort
  selector:
    app: vanguard-health
    component: mongodb
  ports:
  - name: mongo
    protocol: TCP
    port: 27017
    targetPort: 27017
    nodePort: 30017
---
apiVersion: v1
kind: Service
metadata:
  name: dev-redis-nodeport
  namespace: vanguard-health
  labels:
    app: vanguard-health
    component: redis
spec:
  type: NodePort
  selector:
    app: vanguard-health
    component: redis
  ports:
  - name: redis
    protocol: TCP
    port: 6379
    targetPort: 6379
    nodePort: 30379
---

