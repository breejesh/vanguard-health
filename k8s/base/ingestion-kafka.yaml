# The Kafka producer and consumer-based deployment were removed.
# This file now only defines the Spark job trigger (retain for later scheduling).
# Spark job trigger CronJob - runs every hour to process new Bronze data
apiVersion: batch/v1
kind: CronJob
metadata:
  name: spark-job-trigger
  namespace: vanguard-health
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 86400
      backoffLimit: 3
      activeDeadlineSeconds: 7200
      template:
        metadata:
          labels:
            app: bronze-to-silver
        spec:
          serviceAccountName: vanguard-sa
          containers:
          - name: spark-driver
            image: vanguard/spark-jobs:latest
            imagePullPolicy: IfNotPresent
            # Use Docker ENTRYPOINT (spark-submit from Dockerfile)
            envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
            volumeMounts:
            - name: data
              mountPath: /mnt/data
            - name: logs
              mountPath: /app/logs
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
              limits:
                memory: "1Gi"
                cpu: "1"
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: dev-data-pvc
          - name: logs
            emptyDir: {}
          restartPolicy: Never
