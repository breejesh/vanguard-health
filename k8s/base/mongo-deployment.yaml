---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-mongodb
  namespace: vanguard-health
  labels:
    app: vanguard-health
    component: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vanguard-health
      component: mongodb
  template:
    metadata:
      labels:
        app: vanguard-health
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:5.0
        args:
          - "--bind_ip"
          - "0.0.0.0"
        ports:
        - containerPort: 27017
          name: mongo
        volumeMounts:
        - name: data
          mountPath: /data/db
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: "root"
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: MONGODB_PASSWORD
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: dev-mongodb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: dev-mongodb
  namespace: vanguard-health
  labels:
    app: vanguard-health
    component: mongodb
spec:
  selector:
    app: vanguard-health
    component: mongodb
  ports:
  - port: 27017
    targetPort: 27017
    protocol: TCP
  clusterIP: None
