---
# Kafka StatefulSet for message brokering
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dev-kafka
  namespace: vanguard-health
  labels:
    app: vanguard-health
    component: kafka
spec:
  serviceName: dev-kafka
  replicas: 1
  selector:
    matchLabels:
      app: vanguard-health
      component: kafka
  template:
    metadata:
      labels:
        app: vanguard-health
        component: kafka
    spec:
      initContainers:
      - name: fix-kafka-permissions
        image: busybox:1.36
        command:
        - sh
        - -c
        - chown -R 1000:1000 /var/lib/kafka/data && chmod -R 775 /var/lib/kafka/data
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.4.0
        securityContext:
          runAsUser: 0
          runAsGroup: 0
        ports:
        - containerPort: 9092
          name: plaintext
        - containerPort: 9093
          name: controller
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "dev-zookeeper.vanguard-health.svc.cluster.local:2181"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://dev-kafka-0.dev-kafka.vanguard-health.svc.cluster.local:9092"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT"
        - name: KAFKA_INTER_BROKER_LISTENER_NAME
          value: "PLAINTEXT"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
          value: "true"
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka/data
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
      volumes:
      - name: kafka-data
        persistentVolumeClaim:
          claimName: dev-kafka-pvc
---
# Kafka Service
apiVersion: v1
kind: Service
metadata:
  name: dev-kafka
  namespace: vanguard-health
  labels:
    app: vanguard-health
    component: kafka
spec:
  clusterIP: None
  ports:
  - port: 9092
    targetPort: 9092
    name: plaintext
  selector:
    app: vanguard-health
    component: kafka
---
# Zookeeper for Kafka coordination
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-zookeeper
  namespace: vanguard-health
  labels:
    app: vanguard-health
    component: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vanguard-health
      component: zookeeper
  template:
    metadata:
      labels:
        app: vanguard-health
        component: zookeeper
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.4.0
        ports:
        - containerPort: 2181
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_SYNC_LIMIT
          value: "2"
        - name: ZOOKEEPER_INIT_LIMIT
          value: "5"
        volumeMounts:
        - name: zk-data
          mountPath: /var/lib/zookeeper/data
        - name: zk-logs
          mountPath: /var/lib/zookeeper/log
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: zk-data
        persistentVolumeClaim:
          claimName: dev-zookeeper-pvc
      - name: zk-logs
        emptyDir: {}
---
# Zookeeper Service
apiVersion: v1
kind: Service
metadata:
  name: dev-zookeeper
  namespace: vanguard-health
  labels:
    app: vanguard-health
    component: zookeeper
spec:
  selector:
    app: vanguard-health
    component: zookeeper
  ports:
  - port: 2181
    name: client
  clusterIP: None
