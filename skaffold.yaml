apiVersion: skaffold/v4beta6
kind: Config
metadata:
  name: vanguard-health

build:
  tagPolicy:
    envTemplate:
      template: latest
  artifacts:
    - image: vanguard/ingestion
      docker:
        dockerfile: docker/Dockerfile.ingestion

    - image: vanguard/pipeline-orchestrator
      docker:
        dockerfile: docker/Dockerfile.orchestrator

    - image: vanguard/spark-jobs
      docker:
        dockerfile: docker/Dockerfile.spark

deploy:
  kubectl:
    defaultNamespace: vanguard-health

manifests:
  kustomize:
    paths:
      - k8s/overlays/dev

profiles:
  - name: dev
    activation:
      - command: dev
    build:
      local:
        useBuildkit: true
        concurrency: 3
    manifests:
      kustomize:
        paths:
          - k8s/overlays/dev

  - name: prod
    activation:
      - command: run
    build:
      local: {}
    manifests:
      kustomize:
        paths:
          - k8s/overlays/prod

